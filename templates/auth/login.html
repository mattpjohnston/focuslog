{% extends "layout.html" %}
{% block body %}
<div class="auth-container">
  <div class="card auth-card p-4">
    <h1 class="h3 mb-3 text-center">Welcome back</h1>
    <p class="text-muted text-center mb-4">Log in to your FocusLog account.</p>

    {% if error %}
      <div class="alert alert-danger mb-3">{{ error }}</div>
    {% endif %}

    <form action="{{ url_for('login') }}" method="post" autocomplete="off">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input
          class="form-control"
          id="username"
          name="username"
          required
          autofocus
        >
      </div>
      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input
          class="form-control"
          id="password"
          name="password"
          type="password"
          required
        >
      </div>
      <button class="btn btn-primary w-100 mb-2" type="submit">Log in</button>
      <div class="text-center text-muted mt-2">
        Don’t have an account?
        <a href="{{ url_for('register') }}">Register</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
