{% extends "layout.html" %}
{% block body %}
<h1 class="h3 mb-3">
  {% if module %}Edit module{% else %}New module{% endif %}
</h1>

{% if error %}
  <div class="alert alert-danger mb-3">{{ error }}</div>
{% endif %}

<div class="card p-3">
  <form
    action="{% if module %}{{ url_for('module_edit', module_id=module.id) }}{% else %}{{ url_for('module_new', course_id=course.id) }}{% endif %}"
    method="post"
    class="constrained-form"
  >
    <div class="mb-3">
      <label for="name" class="form-label">Module name</label>
      <input
        class="form-control"
        id="name"
        name="name"
        required
        value="{{ module and module.name or '' }}"
      >
    </div>
    <div class="mb-4">
      <label for="target_hours" class="form-label">Target hours (optional)</label>
      <input
        class="form-control"
        id="target_hours"
        name="target_hours"
        type="number"
        min="0"
        step="0.5"
        value="{{ module and module.target_hours or '' }}"
      >
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit">
        {% if module %}Save changes{% else %}Create module{% endif %}
      </button>
      <a
        class="btn btn-outline-secondary"
        href="{{ url_for('course_detail', course_id=course.id) }}"
      >
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}
