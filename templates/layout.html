<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>FocusLog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 default light theme -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <!-- Custom overrides -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="{{ url_for('static', filename='main.js') }}" defer></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">FocusLog</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
          aria-controls="nav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="nav">
          {% if session.get("user_id") %}
            <ul class="navbar-nav me-3">
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('summary') }}">Summary</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('courses') }}">Courses</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{ url_for('sessions_view') }}">Sessions</a>
              </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
              <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('change_password') }}">
                Change password
              </a>
              <a class="btn btn-sm btn-light" href="{{ url_for('logout') }}">Log out</a>
            </div>
          {% else %}
            <div class="d-flex gap-2">
              <a class="btn btn-sm btn-outline-dark" href="{{ url_for('login') }}">Log in</a>
              <a class="btn btn-sm btn-light" href="{{ url_for('register') }}">Register</a>
            </div>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container mb-5">
      {% block body %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
